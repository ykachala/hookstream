apiVersion: v1
kind: Service
metadata:
  name: {{ include "hookstream.fullname" . }}
  labels:
    {{- include "hookstream.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "hookstream.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
